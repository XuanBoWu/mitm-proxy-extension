  <path class="stroke" d="M315 265 H386 C435 265 461 290 478 332 L516 425 C535 472 568 512 637 512"/>
  <path class="stroke" d="M304 512 H637"/>
  <path class="stroke" d="M315 759 H386 C435 759 461 734 478 692 L516 599 C535 552 568 512 637 512"/>

