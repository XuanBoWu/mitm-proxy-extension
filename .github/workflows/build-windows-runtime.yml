name: Build and Package SecMP

on:
  workflow_dispatch:
    inputs:
      build_runtime:
        description: "Build runtime packages. Leave false to publish/package a VSIX that reuses DEFAULT_RUNTIME_VERSION."
        required: true
        type: boolean
        default: false
      runtime_version:
        description: "Runtime package version. Defaults to extension.js DEFAULT_RUNTIME_VERSION."
        required: false
        default: ""
      publish:
        description: "Publish a GitHub Release after build and tests pass"
        required: true
        type: boolean
        default: false
      release_tag:
        description: "Release tag to create/use when publish=true. Defaults to v<package.json version>."
        required: false
        default: ""
  pull_request:
    paths:
      - ".github/workflows/build-windows-runtime.yml"
      - "package.json"
      - "requirements-runtime.txt"
      - "scripts/build-macos-runtime.sh"
      - "scripts/build-windows-runtime.ps1"
      - "scripts/check-l10n.js"
      - "scripts/test-body-fetch-policy.js"
      - "scripts/test-extension-runtime-install.js"
      - "scripts/test-secmp-session.js"
      - "scripts/test-windows-runtime.ps1"
      - "secmp_session.js"
      - "tools/**"
      - "l10n/**"
      - "package.nls.json"
      - "package.nls.zh-cn.json"
      - "webview/**"
      - "extension.js"
  push:
    branches:
      - master
      - staging
    tags:
      - "v*"
    paths:
      - ".github/workflows/build-windows-runtime.yml"
      - "package.json"
      - "requirements-runtime.txt"
      - "scripts/build-macos-runtime.sh"
      - "scripts/build-windows-runtime.ps1"
      - "scripts/check-l10n.js"
      - "scripts/test-body-fetch-policy.js"
      - "scripts/test-extension-runtime-install.js"
      - "scripts/test-secmp-session.js"
      - "scripts/test-windows-runtime.ps1"
      - "secmp_session.js"
      - "tools/**"
      - "l10n/**"
      - "package.nls.json"
      - "package.nls.zh-cn.json"
      - "webview/**"
      - "extension.js"

permissions:
  contents: read

jobs:
  detect:
    runs-on: ubuntu-latest

    outputs:
      build_runtime: ${{ steps.detect.outputs.build_runtime }}
      extension_version: ${{ steps.detect.outputs.extension_version }}
      runtime_changed: ${{ steps.detect.outputs.runtime_changed }}
      runtime_version: ${{ steps.detect.outputs.runtime_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect runtime build requirement
        id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          INPUT_BUILD_RUNTIME: ${{ github.event.inputs.build_runtime }}
          INPUT_RUNTIME_VERSION: ${{ github.event.inputs.runtime_version }}
        run: |
          set -euo pipefail

          extension_version="$(node -p "require('./package.json').version")"
          runtime_version="${INPUT_RUNTIME_VERSION:-}"
          if [[ -z "$runtime_version" ]]; then
            runtime_version="$(node - <<'NODE'
          const fs = require("fs");
          const source = fs.readFileSync("extension.js", "utf8");
          const match = source.match(/const\s+DEFAULT_RUNTIME_VERSION\s*=\s*"([^"]+)"/);
          if (!match) throw new Error("DEFAULT_RUNTIME_VERSION not found in extension.js");
          process.stdout.write(match[1]);
          NODE
          )"
          fi

          runtime_changed=false
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            if [[ "$INPUT_BUILD_RUNTIME" == "true" ]]; then
              runtime_changed=true
            fi
          elif [[ "$REF_TYPE" == "tag" ]]; then
            if [[ "$runtime_version" == "$extension_version" ]]; then
              runtime_changed=true
            fi
          else
            base="$BEFORE_SHA"
            head="$HEAD_SHA"
            if [[ "$EVENT_NAME" == "pull_request" ]]; then
              base="$PR_BASE_SHA"
              head="$PR_HEAD_SHA"
            fi
            if [[ -z "$base" || "$base" =~ ^0+$ ]]; then
              runtime_changed=true
            else
              git diff --name-only "$base" "$head" > changed-files.txt
              if grep -Eq '^(requirements-runtime\.txt|tools/|scripts/build-macos-runtime\.sh|scripts/build-windows-runtime\.ps1|scripts/test-extension-runtime-install\.js|scripts/test-windows-runtime\.ps1|media/secmp\.(ico|icns)|\.github/workflows/build-windows-runtime\.yml)$' changed-files.txt; then
                runtime_changed=true
              fi
              if git diff "$base" "$head" -- extension.js | grep -Eq 'DEFAULT_RUNTIME_VERSION|PACKAGED_RUNTIME_API_VERSION'; then
                runtime_changed=true
              fi
            fi
          fi

          echo "extension_version=$extension_version" >> "$GITHUB_OUTPUT"
          echo "runtime_version=$runtime_version" >> "$GITHUB_OUTPUT"
          echo "runtime_changed=$runtime_changed" >> "$GITHUB_OUTPUT"
          echo "build_runtime=$runtime_changed" >> "$GITHUB_OUTPUT"
          echo "extension_version=$extension_version"
          echo "runtime_version=$runtime_version"
          echo "runtime_changed=$runtime_changed"

  build-runtime:
    runs-on: windows-latest
    needs: detect
    if: needs.detect.outputs.build_runtime == 'true'

    outputs:
      runtime_version: ${{ steps.version.outputs.runtime_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve runtime version
        id: version
        shell: pwsh
        run: |
          $version = "${{ needs.detect.outputs.runtime_version }}"
          "runtime_version=$version" >> $env:GITHUB_OUTPUT

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build runtime
        shell: pwsh
        run: |
          .\scripts\build-windows-runtime.ps1 `
            -RuntimeVersion "${{ steps.version.outputs.runtime_version }}" `
            -Python python `
            -OutputDir dist

      - name: Upload runtime artifact for tests
        uses: actions/upload-artifact@v4
        with:
          name: windows-runtime-package
          retention-days: 7
          path: |
            dist/*.zip
            dist/*.sha256

  test-runtime:
    runs-on: windows-latest
    needs: build-runtime
    if: needs.build-runtime.result == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download runtime artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-runtime-package
          path: dist

      - name: Smoke test runtime
        shell: pwsh
        run: |
          $zip = Get-ChildItem dist -Filter "*.zip" | Select-Object -First 1
          if (-not $zip) {
            throw "Runtime zip artifact not found"
          }
          .\scripts\test-windows-runtime.ps1 `
            -RuntimeZip $zip.FullName `
            -RuntimeVersion "${{ needs.build-runtime.outputs.runtime_version }}"

      - name: Smoke test extension runtime install
        shell: pwsh
        run: |
          $zip = Get-ChildItem dist -Filter "*.zip" | Select-Object -First 1
          if (-not $zip) {
            throw "Runtime zip artifact not found"
          }
          node .\scripts\test-extension-runtime-install.js `
            --runtime-zip $zip.FullName `
            --runtime-version "${{ needs.build-runtime.outputs.runtime_version }}"

  build-macos-runtime:
    runs-on: macos-latest
    needs: detect
    if: needs.detect.outputs.build_runtime == 'true'

    outputs:
      runtime_version: ${{ steps.version.outputs.runtime_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve runtime version
        id: version
        run: |
          version="${{ needs.detect.outputs.runtime_version }}"
          echo "runtime_version=$version" >> "$GITHUB_OUTPUT"

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build macOS runtime
        run: |
          bash scripts/build-macos-runtime.sh \
            --runtime-version "${{ steps.version.outputs.runtime_version }}" \
            --python python \
            --output-dir dist

      - name: Upload macOS runtime artifact for tests
        uses: actions/upload-artifact@v4
        with:
          name: macos-runtime-package
          retention-days: 7
          path: |
            dist/*.zip
            dist/*.sha256

  test-macos-runtime:
    runs-on: macos-latest
    needs: build-macos-runtime
    if: needs.build-macos-runtime.result == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download macOS runtime artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-runtime-package
          path: dist

      - name: Smoke test extension runtime install
        run: |
          set -euo pipefail
          zip="$(ls dist/*.zip | head -n 1)"
          node scripts/test-extension-runtime-install.js \
            --runtime-zip "$zip" \
            --runtime-version "${{ needs.build-macos-runtime.outputs.runtime_version }}"

  package-vsix:
    runs-on: ubuntu-latest
    needs:
      - detect
      - build-runtime
      - test-runtime
      - build-macos-runtime
      - test-macos-runtime
    if: >
      always() &&
      needs.detect.result == 'success' &&
      (
        needs.detect.outputs.build_runtime != 'true' ||
        (
          needs.test-runtime.result == 'success' &&
          needs.test-macos-runtime.result == 'success'
        )
      )
    outputs:
      extension_version: ${{ steps.package-version.outputs.extension_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Resolve extension version
        id: package-version
        run: |
          version="${{ needs.detect.outputs.extension_version }}"
          echo "extension_version=$version" >> "$GITHUB_OUTPUT"

      - name: Extension checks
        run: |
          set -euo pipefail
          node --check extension.js
          node --check webview/app.js
          node --check scripts/test-body-fetch-policy.js
          npm run l10n:check
          npm run test:session
          node scripts/test-body-fetch-policy.js

      - name: Package VSIX
        run: npx --yes @vscode/vsce package --allow-missing-repository

      - name: Smoke test VSIX contents
        run: |
          set -euo pipefail
          vsix="$(ls *.vsix | head -n 1)"
          unzip -l "$vsix"
          if unzip -l "$vsix" | grep -E 'extension/(certificate|\.venv|\.github|scripts|\.build|dist)/'; then
            echo "VSIX contains excluded build/runtime content"
            exit 1
          fi

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-vsix
          retention-days: 7
          path: "*.vsix"

  release:
    runs-on: ubuntu-latest
    needs:
      - detect
      - build-runtime
      - test-runtime
      - build-macos-runtime
      - test-macos-runtime
      - package-vsix
    if: >
      always() &&
      (
        startsWith(github.ref, 'refs/tags/v') ||
        (github.event_name == 'workflow_dispatch' && inputs.publish)
      ) &&
      needs.package-vsix.result == 'success' &&
      (
        needs.detect.outputs.build_runtime != 'true' ||
        (
          needs.test-runtime.result == 'success' &&
          needs.test-macos-runtime.result == 'success'
        )
      )
    permissions:
      contents: write
    environment: release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: release
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            tag="${GITHUB_REF_NAME}"
          elif [[ -n "${{ github.event.inputs.release_tag }}" ]]; then
            tag="${{ github.event.inputs.release_tag }}"
          else
            tag="v${{ needs.package-vsix.outputs.extension_version }}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Download runtime artifact
        if: needs.detect.outputs.build_runtime == 'true'
        uses: actions/download-artifact@v4
        with:
          name: windows-runtime-package
          path: release-assets

      - name: Download macOS runtime artifact
        if: needs.detect.outputs.build_runtime == 'true'
        uses: actions/download-artifact@v4
        with:
          name: macos-runtime-package
          path: release-assets

      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: extension-vsix
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: SecMP ${{ needs.package-vsix.outputs.extension_version }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: |
            release-assets/*
